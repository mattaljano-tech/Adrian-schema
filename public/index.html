        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyD32139sl-MYBnStg5FsGA5tIXS9wQ15JI",
            authDomain: "adrians-schema.firebaseapp.com",
            projectId: "adrians-schema",
            storageBucket: "adrians-schema.firebasestorage.app",
            messagingSenderId: "956492068542",
            appId: "1:956492068542:web:ee1473b9c1d6ed5a1e90ef"
        };
        const appId = 'gaming-schema-app-light';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        // Slå på Offline-läge
            try {
            enableIndexedDbPersistence(db);

            console.log("Offline-läge kunde inte aktiveras just nu", err);
        }
        // --- UTILS ---
        const formatDuration = (mins) => {
            if (mins < 60) return `${mins} min`;
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return m === 0 ? `${h} tim` : `${h} tim ${m} min`;
        };

        // Hämta röster (måste laddas in asynkront av webbläsaren i bakgrunden)
        let availableVoices = [];
        if ('speechSynthesis' in window) {
            availableVoices = window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                availableVoices = window.speechSynthesis.getVoices();
            };
        }

        // Text-till-tal funktion (för dyslexi/språkstörning)
        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'sv-SE';
                utterance.rate = 0.75; // 0.75 är ofta en perfekt balans för tydlighet utan att sluddra
                utterance.pitch = 1.0; // Normal rösthöjd

                // Leta efter den bästa tillgängliga svenska rösten!
                if (availableVoices.length > 0) {
                    const swedishVoices = availableVoices.filter(v => v.lang === 'sv-SE' || v.lang === 'sv_SE');
                    if (swedishVoices.length > 0) {
                        // Prioritera "Premium", "Enhanced", "Google" eller "Klara" (känd tydlig röst på Apple-enheter)
                        const premiumVoice = swedishVoices.find(v => 
                            v.name.includes('Premium') || 
                            v.name.includes('Enhanced') || 
                            v.name.includes('Google') ||
                            v.name.includes('Klara') 
                        );
                        // Använd den bästa rösten, annars ta standardrösten
                        utterance.voice = premiumVoice || swedishVoices[0];
                    }
                }

                window.speechSynthesis.speak(utterance);
            } else {
                alert("Tyvärr stöds inte uppläsning på denna enhet.");
            }
        };

        const getSwedishTimeWords = (date) => {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            
            const hourNames = ["tolv", "ett", "två", "tre", "fyra", "fem", "sex", "sju", "åtta", "nio", "tio", "elva", "tolv"];
            let h = hours % 12;
            let nextH = (h + 1) % 12;
            if (h === 0) h = 12;
            if (nextH === 0) nextH = 12;

            if (minutes === 0) return hourNames[h];
            if (minutes === 5) return `fem över ${hourNames[h]}`;
            if (minutes === 10) return `tio över ${hourNames[h]}`;
            if (minutes === 15) return `kvart över ${hourNames[h]}`;
            if (minutes === 20) return `tjugo över ${hourNames[h]}`;
            if (minutes === 25) return `fem i halv ${hourNames[nextH]}`;
            if (minutes === 30) return `halv ${hourNames[nextH]}`;
            if (minutes === 35) return `fem över halv ${hourNames[nextH]}`;
            if (minutes === 40) return `tjugo i ${hourNames[nextH]}`;
            if (minutes === 45) return `kvart i ${hourNames[nextH]}`;
            if (minutes === 50) return `tio i ${hourNames[nextH]}`;
            if (minutes === 55) return `fem i ${hourNames[nextH]}`;

            const numWords = ["", "en", "två", "tre", "fyra", "fem", "sex", "sju", "åtta", "nio", "tio", "elva", "tolv", "tretton", "fjorton", "femton", "sexton", "sjutton", "arton", "nitton", "tjugo", "tjugoen", "tjugotvå", "tjugotre", "tjugofyra"];
            const getMinStr = (num) => `${numWords[num]} ${num === 1 ? "minut" : "minuter"}`;

            if (minutes > 0 && minutes < 25) {
                if (minutes > 20) return `${getMinStr(30 - minutes)} i halv ${hourNames[nextH]}`;
                return `${getMinStr(minutes)} över ${hourNames[h]}`;
            } else if (minutes > 25 && minutes < 30) {
                return `${getMinStr(30 - minutes)} i halv ${hourNames[nextH]}`;
            } else if (minutes > 30 && minutes < 35) {
                return `${getMinStr(minutes - 30)} över halv ${hourNames[nextH]}`;
            } else if (minutes > 35 && minutes < 45) {
                if (minutes < 40) return `${getMinStr(minutes - 30)} över halv ${hourNames[nextH]}`;
                return `${getMinStr(60 - minutes)} i ${hourNames[nextH]}`;
            } else if (minutes > 45) {
                return `${getMinStr(60 - minutes)} i ${hourNames[nextH]}`;
            }
        };

        const AnalogClock = ({ date, size = 100 }) => {
            const sDeg = date.getSeconds() * 6;
            const mDeg = date.getMinutes() * 6 + date.getSeconds() * 0.1;
            const hDeg = (date.getHours() % 12) * 30 + date.getMinutes() * 0.5;

                    <div className="absolute top-1/2 left-1/2 w-3 h-3 bg-slate-900 rounded-full -translate-x-1/2 -translate-y-1/2 z-20 border-2 border-white shadow-sm"></div>
                    <div className="absolute top-1/2 left-1/2 w-1.5 h-[28%] bg-red-600 rounded-full origin-bottom -translate-x-1/2 -translate-y-full z-10 transition-transform duration-300 ease-in-out" style={{ transform: `translateX(-50%) translateY(-100%) rotate(${hDeg}deg)` }}></div>
                    <div className="absolute top-1/2 left-1/2 w-1 h-[38%] bg-blue-600 rounded-full origin-bottom -translate-x-1/2 -translate-y-full z-10 transition-transform duration-300 ease-in-out" style={{ transform: `translateX(-50%) translateY(-100%) rotate(${mDeg}deg)` }}></div>
                </div>

        };

        // --- THEMES FOR CALENDAR ---
        const monthThemes = [
            { name: "Januari", emoji: "❄️", bgEmoji: "⛄", gradient: "bg-gradient-to-br from-blue-400 to-blue-600", text: "text-blue-600" },
            { name: "Februari", emoji: "⛄", bgEmoji: "🎿", gradient: "bg-gradient-to-br from-cyan-400 to-blue-500", text: "text-cyan-600" },
            { name: "Mars", emoji: "🌱", bgEmoji: "☀️", gradient: "bg-gradient-to-br from-emerald-400 to-green-500", text: "text-emerald-600" },
            { name: "April", emoji: "🐣", bgEmoji: "🌷", gradient: "bg-gradient-to-br from-green-400 to-lime-500", text: "text-green-600" },
            { name: "Maj", emoji: "🌸", bgEmoji: "🐝", gradient: "bg-gradient-to-br from-pink-400 to-rose-500", text: "text-pink-600" },
            { name: "Juni", emoji: "🍓", bgEmoji: "☀️", gradient: "bg-gradient-to-br from-yellow-400 to-orange-400", text: "text-yellow-600" },
            { name: "Juli", emoji: "🏖️", bgEmoji: "🍦", gradient: "bg-gradient-to-br from-orange-400 to-red-400", text: "text-orange-600" },
            { name: "Augusti", emoji: "🍉", bgEmoji: "🌻", gradient: "bg-gradient-to-br from-red-400 to-rose-600", text: "text-red-600" },
            { name: "September", emoji: "🍂", bgEmoji: "🍄", gradient: "bg-gradient-to-br from-amber-500 to-orange-600", text: "text-amber-700" },
            { name: "Oktober", emoji: "🎃", bgEmoji: "👻", gradient: "bg-gradient-to-br from-orange-500 to-red-600", text: "text-orange-700" },
            { name: "November", emoji: "🌧️", bgEmoji: "☕", gradient: "bg-gradient-to-br from-slate-400 to-slate-600", text: "text-slate-600" },
            { name: "December", emoji: "🎄", bgEmoji: "🎅", gradient: "bg-gradient-to-br from-red-500 to-green-600", text: "text-red-700" }
        ];

        const dayStyles = [
            { name: "Mån", full: "Måndag", colorCode: "#4CAF50", main: "bg-[#4CAF50] text-white shadow-md", light: "bg-green-50 text-green-800 border-green-200", outline: "border-[#4CAF50]" },
            { name: "Tis", full: "Tisdag", colorCode: "#2196F3", main: "bg-[#2196F3] text-white shadow-md", light: "bg-blue-50 text-blue-800 border-blue-200", outline: "border-[#2196F3]" },
            { name: "Ons", full: "Onsdag", colorCode: "#94a3b8", main: "bg-slate-400 text-white shadow-md", light: "bg-slate-50 text-slate-700 border-slate-200", outline: "border-slate-400" },
            { name: "Tor", full: "Torsdag", colorCode: "#8D6E63", main: "bg-[#8D6E63] text-white shadow-md", light: "bg-[#EFEBE9] text-[#5D4037] border-[#D7CCC8]", outline: "border-[#8D6E63]" },
            { name: "Fre", full: "Fredag", colorCode: "#D4C42C", main: "bg-[#FFEB3B] text-slate-800 shadow-md", light: "bg-yellow-50 text-yellow-900 border-yellow-200", outline: "border-[#FFEB3B]" },
            { name: "Lör", full: "Lördag", colorCode: "#E91E63", main: "bg-[#E91E63] text-white shadow-md", light: "bg-pink-50 text-pink-900 border-pink-200", outline: "border-[#E91E63]" },
            { name: "Sön", full: "Söndag", colorCode: "#F44336", main: "bg-[#F44336] text-white shadow-md", light: "bg-red-50 text-red-900 border-red-200", outline: "border-[#F44336]" }
        ];

        // --- CALENDAR COMPONENT ---
        const CalendarCard = ({ date }) => {
            const [viewDate, setViewDate] = useState(() => new Date(date.getFullYear(), date.getMonth(), 1));

            const viewYear = viewDate.getFullYear();
            const viewMonth = viewDate.getMonth();
            const realYear = date.getFullYear();
            const realMonth = date.getMonth();
            const realToday = date.getDate();

            const isCurrentMonthView = viewYear === realYear && viewMonth === realMonth;
            const theme = monthThemes[viewMonth];
            
            const containerRef = useRef(null);
            const todayCellRef = useRef(null);
            const todayBoxRef = useRef(null);
            const [arrowPath, setArrowPath] = useState('');
            
            const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
            const firstDayOfMonth = new Date(viewYear, viewMonth, 1).getDay();
            const startOffset = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;
            
            const realStartOffset = new Date(realYear, realMonth, 1).getDay() === 0 ? 6 : new Date(realYear, realMonth, 1).getDay() - 1;
            const todayStyle = dayStyles[(realStartOffset + realToday - 1) % 7];

            const handlePrevMonth = () => setViewDate(new Date(viewYear, viewMonth - 1, 1));
            const handleNextMonth = () => setViewDate(new Date(viewYear, viewMonth + 1, 1));
            const handleResetToToday = () => setViewDate(new Date(realYear, realMonth, 1));

            useEffect(() => {
                const updatePath = () => {
                    if (!isCurrentMonthView || !containerRef.current || !todayCellRef.current || !todayBoxRef.current) {
                        setArrowPath('');
                        return;
                    }
                    const containerRect = containerRef.current.getBoundingClientRect();
                    const cellRect = todayCellRef.current.getBoundingClientRect();
                    const boxRect = todayBoxRef.current.getBoundingClientRect();

                    const targetX = cellRect.left + cellRect.width / 2 - containerRect.left;
                    const targetY = cellRect.bottom - containerRect.top + 8;

                    const sourceX = boxRect.left + boxRect.width / 2 - containerRect.left;
                    const sourceY = boxRect.top - containerRect.top - 8;

                    const cp1X = sourceX;
                    const cp1Y = sourceY - Math.max(40, Math.abs(sourceY - targetY) / 2);
                    const cp2X = targetX;
                    const cp2Y = targetY + Math.max(40, Math.abs(sourceY - targetY) / 2);

                    setArrowPath(`M ${sourceX} ${sourceY} C ${cp1X} ${cp1Y}, ${cp2X} ${cp2Y}, ${targetX} ${targetY}`);
                };

                updatePath();
                const timeoutId = setTimeout(updatePath, 150);
                window.addEventListener('resize', updatePath);
                return () => { clearTimeout(timeoutId); window.removeEventListener('resize', updatePath); };
            }, [date, viewDate, isCurrentMonthView]);

            return (

                            {arrowPath && (

                                    stroke={todayStyle.colorCode} 
                                    strokeWidth="4" 
                                    fill="none" 
                                    markerEnd="url(#dynamic-arrowhead)" 
                                    className="animate-flow opacity-80" 
                                    strokeLinecap="round" 
                                />
                            )}
                        </svg>
                    )}

                    <div className={`${theme.gradient} h-32 sm:h-40 flex items-center justify-center relative overflow-hidden border-b-4 border-slate-200 z-10 transition-colors duration-500`}>
                        <span className="text-6xl sm:text-7xl transform hover:scale-110 transition-transform drop-shadow-xl relative z-10">{theme.emoji}</span>
                        <div className="absolute opacity-20 text-[8rem] -right-10 -bottom-10 select-none pointer-events-none">{theme.bgEmoji}</div>
                        <div className="absolute opacity-20 text-[6rem] -left-10 -top-5 select-none pointer-events-none transform -scale-x-100">{theme.bgEmoji}</div>
                    </div>
                    
                    <div className="p-4 sm:p-8 flex flex-col items-center bg-white relative z-10">

                            <motion.button 
                                whileHover={{ scale: 1.25 }}

                            </motion.button>
                            <span className="min-w-[120px] text-center">{theme.name} {viewYear}</span>
                            <motion.button 
                                whileHover={{ scale: 1.25 }}

                            >

                            </motion.button>
                        </div>
                        
                        <div className="w-full mt-6">
                            <div className="grid grid-cols-7 gap-1 sm:gap-2 mb-3 text-center">
                                {dayStyles.map(style => (
                                    <div key={style.name} className={`${style.main} py-2 rounded-lg text-[10px] sm:text-xs font-black uppercase tracking-wider`}>

                                ))}
                            </div>
                            
                            <div className="grid grid-cols-7 gap-1 sm:gap-2 text-center">
                                {Array.from({ length: startOffset }).map((_, i) => (
                                    <div key={`empty-${i}`} className="p-2 sm:p-3"></div>
                                ))}
                                {Array.from({ length: daysInMonth }).map((_, i) => {
                                    const dayNum = i + 1;
                                    const isToday = isCurrentMonthView && dayNum === realToday;
                                    let isPast = false;
                                    if (viewYear < realYear || (viewYear === realYear && viewMonth < realMonth)) {
                                        isPast = true;
                                    } else if (isCurrentMonthView && dayNum < realToday) {
                                        isPast = true;
                                    }
                                    const colIndex = (startOffset + i) % 7;
                                    const dayStyle = dayStyles[colIndex];
                                    
                                    return (

                                            ref={isToday ? todayCellRef : null}

        // --- INTERACTIVE DRAGGABLE CLOCK ---
        const InteractiveClock = ({ time, setTime, onDoubleClick }) => {
            const svgRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);
            const [lastAngle, setLastAngle] = useState(0);

            const getAngle = (clientX, clientY) => {
                if (!svgRef.current) return 0;
                const rect = svgRef.current.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                let angle = Math.atan2(clientY - cy, clientX - cx) * (180 / Math.PI);
                angle = angle + 90; 
                if (angle < 0) angle += 360;
                return angle;
            };

            const handlePointerDown = (e) => {
                setIsDragging(true);
                setLastAngle(getAngle(e.clientX, e.clientY));
                e.target.setPointerCapture(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!isDragging) return;
                const currentAngle = getAngle(e.clientX, e.clientY);
                let diff = currentAngle - lastAngle;
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;
                setTime(prev => prev + (diff / 6) * 60000);
                setLastAngle(currentAngle);
            };

            const handlePointerUp = (e) => {
                setIsDragging(false);
                e.target.releasePointerCapture(e.pointerId);
                setTime(prev => Math.round(prev / 60000) * 60000);
            };

            const dDate = new Date(time);
            const hDeg = (dDate.getHours() % 12) * 30 + dDate.getMinutes() * 0.5;
            const mDeg = dDate.getMinutes() * 6 + dDate.getSeconds() * 0.1;

            return (
                <div className="relative flex flex-col items-center">
                    <svg 
                        ref={svgRef}
                        width="100%" height="100%" viewBox="0 0 280 280"
                        className="touch-none bg-white rounded-full border-[8px] sm:border-[12px] border-slate-900 shadow-2xl cursor-pointer w-64 h-64 sm:w-80 sm:h-80"
                        onPointerDown={handlePointerDown}
                        onPointerMove={handlePointerMove}
                        onPointerUp={handlePointerUp}

                            wakeLock = await navigator.wakeLock.request('screen');
                            console.log('Skärmen hålls vaken!');
                        }
                    } catch (err) {
                        console.error(`Kunde inte hålla skärmen vaken: ${err.message}`);
                    }
                };

                requestWakeLock();

                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible') {
                        requestWakeLock();
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    if (wakeLock !== null) {
                        wakeLock.release();
                    }
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                };
            }, []);

            // Timer för skärmsläckaren
            useEffect(() => {
                let timeoutId;
                const handleActivity = () => {
                    setIsIdle(false);
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => {
                        setIsIdle(true);
                        setActiveTab('schema');
                    }, 600000); 
                };

                window.addEventListener('touchstart', handleActivity);
                window.addEventListener('click', handleActivity);
                window.addEventListener('scroll', handleActivity);
                window.addEventListener('mousemove', handleActivity);

                handleActivity(); 

                return () => {
                    clearTimeout(timeoutId);
                    window.removeEventListener('touchstart', handleActivity);
                    window.removeEventListener('click', handleActivity);
                    window.removeEventListener('scroll', handleActivity);
                    window.removeEventListener('mousemove', handleActivity);
                };
            }, []);

            const now = currentTime.getTime();
            const activeAndFuture = activities.filter(a => a.endTime > now && (a.startTime - now) < 24*60*60*1000);
            
            // --- SKAPA AUTOMATISKA FRITIDS-GAP MELLAN AKTIVITETERNA ---
            let timeline = [];
            if (activeAndFuture.length > 0) {
                const firstEvent = activeAndFuture[0];
                if (firstEvent.startTime > now) {
                    const gapMs = firstEvent.startTime - now;
                    if (gapMs >= 60000) { 
                        timeline.push({
                            id: 'gap-initial',
                            title: 'Välj ett uppdrag 🎯',
                            startTime: now,
                            endTime: firstEvent.startTime,
                            duration: Math.round(gapMs / 60000),
                            isGap: true
                        });
                    }
                }
                
                for (let i = 0; i < activeAndFuture.length; i++) {
                    timeline.push(activeAndFuture[i]);
                    if (i < activeAndFuture.length - 1) {
                        const currentEvent = activeAndFuture[i];
                        const nextEvent = activeAndFuture[i+1];
                        const gapMs = nextEvent.startTime - currentEvent.endTime;
                        if (gapMs >= 2 * 60000) { 
                            timeline.push({
                                id: `gap-${currentEvent.id}`,
                                title: 'Välj ett uppdrag 🎯',
                                startTime: currentEvent.endTime,
                                endTime: nextEvent.startTime,
                                duration: Math.round(gapMs / 60000),
                                isGap: true
                            });
                        }
                    }
                }
            }
            
            timeline.sort((a, b) => a.startTime - b.startTime);

            const current = timeline.find(a => a.startTime <= now && a.endTime > now);
            const future = timeline.filter(a => a.startTime > now);
            const live = activeAndFuture.find(a => a.isLiveEvent);

            const getRem = (t) => {
                const diff = t - now;
                if (diff <= 0) return { h:0, m:0, s:0 };
                return { h: Math.floor(diff/3600000), m: Math.floor((diff/60000)%60), s: Math.floor((diff/1000)%60) };

                                        </div>
                                        <div className="bg-slate-50 p-4 sm:p-8 rounded-[1.5rem] sm:rounded-[2.5rem] border-2 border-slate-100 shadow-inner w-full flex justify-center items-start gap-2 sm:gap-4 font-clock text-4xl sm:text-7xl md:text-8xl">
                                            {getRem(live.startTime).h > 0 && <><div className="flex flex-col items-center"><span className="text-slate-800 leading-none">{pad(getRem(live.startTime).h)}</span><span className="text-[8px] sm:text-[10px] uppercase font-black text-slate-400 mt-2 sm:mt-4">Timmar</span></div><span className="text-slate-200 text-2xl sm:text-3xl mt-2 sm:mt-4">:</span></>}
                                            <div className="flex flex-col items-center"><span className="text-slate-800 leading-none">{pad(getRem(live.startTime).m)}</span><span className="text-[8px] sm:text-[10px] uppercase font-black text-slate-400 mt-2 sm:mt-4">Minuter</span></div>
                                            <span className="text-slate-200 text-2xl sm:text-3xl mt-2 sm:mt-4">:</span>
                                            <div className="flex flex-col items-center"><span className="text-red-500 leading-none">{pad(getRem(live.startTime).s)}</span><span className="text-[8px] sm:text-[10px] uppercase font-black text-red-400 mt-2 sm:mt-4 font-clock">Sekunder</span></div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'learn' && (
                        <div className="space-y-12 animate-in fade-in slide-in-from-bottom-4 duration-500">
                            <CalendarCard date={currentTime} />
                            <LearnClock />
                            <LearnRhymes />
                        </div>
                    )}

                    {activeTab === 'earn' && (
                        <EconomyTab addMoney={addMoney} bankBalance={bankBalance} bankStreak={bankStreak} claimedQuests={claimedQuests} sendMessage={sendMessage} adminName={adminName} />
                    )}
                    {activeTab === 'shop' && (
    <ShopTab 
        bankBalance={bankBalance} 
        handleClaim={addMoney} 
        sendMessage={sendMessage} 
    />
)}
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState(() => localStorage.getItem('adrian_app_role') || 'child');
            const [activities, setActivities] = useState([]);
            const [messages, setMessages] = useState([]);
            const [bankBalance, setBankBalance] = useState(0); 
            const [bankStreak, setBankStreak] = useState(0);
            const [lastActiveDate, setLastActiveDate] = useState('');
            const [claimedQuests, setClaimedQuests] = useState({});
            
            // NYA STATEN FÖR NAMN OCH MEDDELANDE
            const [adminName, setAdminName] = useState('Din Förebild');
            const [dailyMessage, setDailyMessage] = useState('');
            const [bedtime, setBedtime] = useState('22:00');

            const [currentTime, setCurrentTime] = useState(new Date());
            const [notifsEnabled, setNotifsEnabled] = useState(
    'Notification' in window && Notification.permission === 'granted'
);

            const [error, setError] = useState(null);
            const audioRef = useRef(null);
            const firedNotifs = useRef(new Set());

            const changeRole = (newRole) => {
                if (newRole) {
                    localStorage.setItem('adrian_app_role', newRole);
                } else {
                    localStorage.removeItem('adrian_app_role');
                }
                setRole(newRole || 'child');
            };

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        console.error("Auth error:", err);
                        setError("Kunde inte logga in. Kontrollera Firebase.");
                    }
                };
                initAuth();
                const unsubAuth = onAuthStateChanged(auth, setUser);
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { unsubAuth(); clearInterval(timer); };
            }, []);

            useEffect(() => {
                if (!user) return; 
                
                // Lyssna på Schemat
                const colPath = collection(db, 'artifacts', appId, 'public', 'data', 'schedule_items');
                const unsubscribe = onSnapshot(colPath, (snapshot) => {
                    const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    items.sort((a, b) => a.startTime - b.startTime);
                    setActivities(items);
                    setError(null);
                }, (err) => {
                    if (err.code === 'permission-denied') setError("Databasen är låst. Kolla reglerna i Firebase.");
                });

                // Lyssna på Bank, Streaks, NAMN och DAGENS MEDDELANDE
                const bankDoc = doc(db, 'artifacts', appId, 'public', 'data', 'bank', 'adrian');
                const unsubBank = onSnapshot(bankDoc, (d) => {
                    if (d.exists()) {
                        const data = d.data();
                        setBankBalance(data.balance || 0);
                        setBankStreak(data.streak || 0);
                        setLastActiveDate(data.lastActive || '');
                        setClaimedQuests(data.claimedQuests || {});
                        setAdminName(data.adminName || 'Din kompis');
                        setDailyMessage(data.dailyMessage || '');
                        setBedtime(data.bedtime || '22:00');
                    } else {
                        setDoc(bankDoc, { balance: 0, streak: 0, lastActive: '', claimedQuests: {}, adminName: 'Din Förebild', dailyMessage: '' }).catch(console.error);
                    }
                });

                // Lyssna på Meddelanden (Inkorgen)
                const msgPath = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                const unsubMsg = onSnapshot(msgPath, (snapshot) => {
                    const msgs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    msgs.sort((a, b) => b.time - a.time);
                    setMessages(msgs);
                });

                return () => { unsubscribe(); unsubBank(); unsubMsg(); }
            }, [user]);

            const sendMessage = async (text, icon) => {
                try {
                    const colPath = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                    await addDoc(colPath, { text, icon, time: Date.now() });
                } catch (err) {
                    console.error("Kunde inte skicka meddelande", err);
                }
            };

            const addMoney = async (amount, isActivity = false, questId = null) => {
                try {
                    const today = new Date().toISOString().split('T')[0];
                    let newStreak = bankStreak;

                    if (isActivity && lastActiveDate !== today) {
                        const yesterdayDate = new Date(Date.now() - 86400000);
                        const yesterday = yesterdayDate.toISOString().split('T')[0];
                        
                        if (lastActiveDate === yesterday) {
                            newStreak += 1; 
                        } else {
                            newStreak = 1; 
                        }
                    }

                    const bankDoc = doc(db, 'artifacts', appId, 'public', 'data', 'bank', 'adrian');
                    
                    const updates = {
                        balance: bankBalance + amount,
                        streak: isActivity ? newStreak : bankStreak,
                        lastActive: isActivity ? today : lastActiveDate
                    };

                    if (questId) {
                        updates.claimedQuests = {
                            ...claimedQuests,
                            [questId]: Date.now()
                        };
                    }

                    await updateDoc(bankDoc, updates);
                } catch (err) {
                    console.error("Kunde inte uppdatera banken", err);
                }
            };

            const setBankZero = async () => {
                try {
                    const bankDoc = doc(db, 'artifacts', appId, 'public', 'data', 'bank', 'adrian');
                    await updateDoc(bankDoc, { balance: 0 });
                } catch (err) {
                    console.error("Kunde inte nolla banken", err);
                }
            };

            const setStreakZero = async () => {
                try {
                    const bankDoc = doc(db, 'artifacts', appId, 'public', 'data', 'bank', 'adrian');
                    await updateDoc(bankDoc, { streak: 0 });
                    alert("Streaken är nu nollställd!");
                } catch (err) {
                    console.error("Kunde inte nolla streak", err);
                }
            };

            const resetDailyQuests = async () => {
                try {
                    const bankDoc = doc(db, 'artifacts', appId, 'public', 'data', 'bank', 'adrian');
                    await updateDoc(bankDoc, { claimedQuests: {} });
                    alert("Dagens uppdrag är nu upplåsta och kan göras igen!");
                } catch (err) {
                    console.error("Kunde inte återställa uppdrag", err);
                }
            };
            // ------------------------------

            useEffect(() => {
                if (!notifsEnabled || role !== 'child') return;
                activities.forEach(a => {
                    const now = currentTime.getTime();
                    const prepStart = a.startTime - (a.prepTime * 60000);
                    if (a.prepTime > 0 && Math.abs(now - prepStart) < 2000 && !firedNotifs.current.has(a.id + '-prep')) {
                        if (Notification.permission === "granted") new Notification("Dags att göra sig i ordning!", { body: a.title });
                        audioRef.current?.play().catch(e => console.log("Audio failed", e));
                        firedNotifs.current.add(a.id + '-prep');
                    }
                    if (Math.abs(now - a.startTime) < 2000 && !firedNotifs.current.has(a.id + '-start')) {
                        if (Notification.permission === "granted") new Notification("Nu börjar det!", { body: a.title });
                        audioRef.current?.play().catch(e => console.log("Audio failed", e));
                        firedNotifs.current.add(a.id + '-start');
                    }
                });
            }, [currentTime, notifsEnabled, activities, role]);

            const enableNotifs = async () => {
                if (!window.Notification) {
                    alert("Notiser stöds inte. På iPhone MÅSTE du trycka på 'Dela' -> 'Lägg till på hemskärmen' först!");
                    return;
                }

                try {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        setNotifsEnabled(true);
                        audioRef.current?.play().catch(e => console.log("Init audio failed", e));

                        // 1. Tvinga appen att använda rätt Service Worker för notiserna
                        const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

                        // 2. Hämta token från Google
                        const messaging = getMessaging(app);
                        const currentToken = await getToken(messaging, { 
    vapidKey: 'BKc6JIfn6UU5KfzfPe0l56Pj5gFfQflQeroH8hEenz3OoeiFrfQIdwhKD1c380MP9ydhPVdOyvIE4C-Schh-0sA',
    serviceWorkerRegistration: registration 
});

                        if (currentToken) {
                            console.log("Fick Token!", currentToken);
                            
                            // 3. Spara till RÄTT mapp i databasen! (device_tokens -> adrians_telefon)
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'device_tokens', 'adrians_telefon'), { 
                                token: currentToken 
                            });
                            
                            alert("BINGO! Token hämtad och sparad i databasen!");
                        } else {
                            alert("Kunde inte hämta nyckeln från Google.");
                        }
                    }
                } catch (error) {
                    console.error("Kunde inte aktivera push-notiser", error);
                    alert("Fel vid hämtning: " + error.message);
                }
            };

            const bedtimeInfo = ((currentMs) => {
                const now = new Date(currentMs);
                const bedTimeDate = new Date(currentMs);
                const [bedH, bedM] = bedtime.split(':').map(Number);
                if (now.getHours() < 6) bedTimeDate.setDate(bedTimeDate.getDate() - 1);
                bedTimeDate.setHours(bedH, bedM, 0, 0);
                const diffMins = Math.floor((currentMs - bedTimeDate.getTime()) / 60000);
                if (diffMins >= 0) return { text: `+${diffMins} min`, isLate: true };
                const absMins = Math.abs(diffMins);
                if (absMins >= 60) return { text: `${Math.floor(absMins / 60)}h ${absMins % 60}m kvar`, isLate: false };
                return { text: `${absMins} min kvar`, isLate: false };
            })(currentTime.getTime());

            return (
    <div className="min-h-screen bg-slate-100">
        
        {/* Nattläge - Dämpar skärmen och värmer färgerna mellan 20:00 - 06:00 */}
        {(currentTime.getHours() >= 20 || currentTime.getHours() < 6) && (
            <div className="fixed inset-0 z-[9998] pointer-events-none bg-orange-900/10 backdrop-brightness-75 backdrop-contrast-125 transition-all duration-1000"></div>
        )}

        {/* NYTT: SCREENSAVER */}
                    
                    
                    <div className="max-w-3xl mx-auto p-4 md:p-8 pb-20 relative">
                        <audio ref={audioRef} src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" />
                        
                        {error && (
                            <div className="mb-6 p-4 bg-red-100 border-2 border-red-200 text-red-700 rounded-2xl font-bold text-center relative z-10">
                                {error}
                            </div>
                        )}

                        {role === 'parent' ? (
                            <ParentUI 
                                activities={activities} 
                                messages={messages}
                                bankBalance={bankBalance} 
                                addMoney={addMoney} 
                                setBankZero={setBankZero}
                                adminName={adminName}
                                setAdminName={setAdminName}
                                dailyMessage={dailyMessage}
                                setDailyMessage={setDailyMessage}
                                db={db} 
                                appId={appId} 
                                user={user} 
                                onLogout={() => changeRole('child')} 
                                setStreakZero={setStreakZero}
                                resetDailyQuests={resetDailyQuests}
                            />
                        ) : (
                            <ChildUI 
                                activities={activities} 
                                currentTime={currentTime} 
                                bankBalance={bankBalance} 
                                bankStreak={bankStreak}
                                claimedQuests={claimedQuests}
                                addMoney={addMoney} 
                                sendMessage={sendMessage}
                                adminName={adminName}
                                dailyMessage={dailyMessage}
                                db={db} 
                                appId={appId} 
                                onLogout={() => changeRole('child')}
                                changeRole={changeRole}
                                notifsEnabled={notifsEnabled}
                                enableNotifs={enableNotifs}
                                bedtimeInfo={bedtimeInfo}
                            />
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
